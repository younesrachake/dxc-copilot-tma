name: DXC Copilot — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dxc-copilot

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Frontend: build + unit tests (blocking PR gate)
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: 🔨 Frontend — Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle (strict TS compile is the lint gate)
        run: npm run build -- --configuration production

      - name: Install Chrome (for Karma headless)
        uses: browser-actions/setup-chrome@v1

      - name: Unit tests (blocking)
        run: npm run test:ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Backend: ruff + pytest (blocking PR gate)
  # ─────────────────────────────────────────────────────────────
  backend:
    name: 🐍 Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Pytest (hermetic — no models, no API keys)
        run: pytest tests -v --cov=app --cov-report=xml --cov-report=term
        env:
          DISABLE_LOCAL_ML: '1'
          DISABLE_CHROMA: '1'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — E2E: Playwright against the real stack (blocking PR gate)
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: 🎭 E2E — Playwright
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          npm ci
          pip install -r backend/requirements.txt
          npx playwright install --with-deps chromium

      - name: Run E2E suite (backend in LLM-simulation mode)
        run: npx playwright test
        env:
          CI: '1'
          E2E_ADMIN_PASSWORD: E2eAdminPass1234!

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Helm chart validation
  # ─────────────────────────────────────────────────────────────
  helm:
    name: ⎈ Helm — Lint & Render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: helm lint deploy/helm/dxc-copilot

      - name: Helm template render (default + prod values)
        run: |
          helm template ci deploy/helm/dxc-copilot > /dev/null
          helm template ci deploy/helm/dxc-copilot \
            -f deploy/helm/dxc-copilot/values-prod.yaml \
            --set image.backend.tag=ci --set image.frontend.tag=ci > /dev/null

  # ─────────────────────────────────────────────────────────────
  # JOB 5 — Docker Build & Push (main / tags only)
  # ─────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [frontend, backend, e2e, helm]
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: frontend
            context: .
            suffix: ''
          - name: backend
            context: ./backend
            suffix: '-backend'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}:latest
          format: spdx-json
          artifact-name: sbom-${{ matrix.name }}.spdx.json

  # ─────────────────────────────────────────────────────────────
  # JOB 6 — Deploy to Staging
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy — Staging
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: staging
      url: https://staging.copilot.dxc.com
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/dxc-copilot
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            git pull --ff-only || true
            REGISTRY=ghcr.io IMAGE_NAME=${{ env.IMAGE_NAME }} sh scripts/deploy.sh latest
            docker image prune -f

      - name: External health check
        run: |
          sleep 15
          curl -f https://staging.copilot.dxc.com/health || exit 1

  # ─────────────────────────────────────────────────────────────
  # JOB 7 — Deploy to Production (manual approval via environment)
  # ─────────────────────────────────────────────────────────────
  deploy-prod:
    name: 🏭 Deploy — Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://copilot.dxc.com
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/dxc-copilot
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            git pull --ff-only || true
            REGISTRY=ghcr.io IMAGE_NAME=${{ env.IMAGE_NAME }} sh scripts/deploy.sh latest
            docker image prune -f

      - name: External health check
        run: |
          sleep 20
          curl -f https://copilot.dxc.com/health || exit 1

      - name: Notify Teams on success
        if: success()
        run: |
          curl -H "Content-Type: application/json" -d '{
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "themeColor": "00B050",
            "summary": "DXC Copilot deployed",
            "sections": [{ "activityTitle": "✅ DXC Copilot deployed to Production", "activitySubtitle": "SHA: ${{ github.sha }}" }]
          }' ${{ secrets.TEAMS_WEBHOOK_URL }} || true
