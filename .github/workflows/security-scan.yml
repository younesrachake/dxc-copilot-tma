name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 03:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: 🔑 Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so leaks in old commits are caught

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: 🔒 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical = blocking)
        run: npm audit --audit-level=critical

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: pip audit (report only)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict --desc || true

  docker-scan:
    name: 🐳 Docker Image Scan (Trivy)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image for scanning
        run: docker build -t dxc-copilot:scan .

      - name: Trivy scan — report (HIGH+) to Security tab
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'dxc-copilot:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy scan — CRITICAL vulnerabilities are blocking
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'dxc-copilot:scan'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
