line-length = 120
target-version = "py310"

[lint]
select = ["E4", "E7", "E9", "F", "W6"]
ignore = [
    "E731",  # lambda assignments — used deliberately for column defaults
]

[lint.per-file-ignores]
# conftest must configure env vars BEFORE importing app modules
"tests/conftest.py" = ["E402"]
# `import X` inside try/except is the intended availability probe
"app/services/ocr_service.py" = ["F401"]
"app/services/stt_service.py" = ["F401"]
