# In Kubernetes the container serves plain HTTP on :8080 — TLS terminates at
# the Ingress, and the Ingress (not this nginx) routes /api to the backend.
# This overrides the TLS/proxy nginx.conf baked into the image for Compose.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dxc-copilot.frontend.fullname" . }}-nginx
  labels:
    {{- include "dxc-copilot.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin" always;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /healthz {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~ /\. {
            deny all;
            access_log off;
        }
    }
