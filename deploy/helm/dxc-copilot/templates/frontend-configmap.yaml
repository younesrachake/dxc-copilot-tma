# In Kubernetes the container serves plain HTTP on :8080 — TLS terminates at
# the Ingress, and the Ingress (not this nginx) routes /api to the backend.
# This overrides the TLS/proxy nginx.conf baked into the image for Compose.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dxc-copilot.frontend.fullname" . }}-nginx
  labels:
    {{- include "dxc-copilot.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin" always;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /healthz {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        {{- if .Values.frontend.proxyApi }}
        # Direct /api proxy to the backend — used when there is no Ingress in
        # front (e.g. local kind cluster). SSE endpoint needs unbuffered proxying.
        location = /api/chat/stream {
            proxy_pass http://{{ include "dxc-copilot.backend.fullname" . }}:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
        location /api/ {
            proxy_pass http://{{ include "dxc-copilot.backend.fullname" . }}:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        {{- end }}

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~ /\. {
            deny all;
            access_log off;
        }
    }
