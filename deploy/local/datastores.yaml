# ─────────────────────────────────────────────────────────────────────────────
# Local-dev datastores for the kind cluster — Postgres + Redis.
# The Helm chart treats DB/Redis as external (managed in prod); for a local
# cluster we run lightweight single-replica instances here.
#   DATABASE_URL = postgresql+asyncpg://dxc:dxcsecret2024@postgres:5432/dxc_copilot
#   REDIS_URL    = redis://:dxcredis2024@redis:6379/0
# NOT for production — credentials are inline for local convenience only.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels: { app: postgres }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER,     value: dxc }
            - { name: POSTGRES_PASSWORD, value: dxcsecret2024 }
            - { name: POSTGRES_DB,       value: dxc_copilot }
            - { name: PGDATA,            value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "dxc", "-d", "dxc_copilot"] }
            periodSeconds: 5
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels: { app: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--requirepass", "dxcredis2024"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec: { command: ["redis-cli", "-a", "dxcredis2024", "ping"] }
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
