version: '3.9'

services:

  # ── Angular App (Nginx) ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: dxc-copilot:latest
    container_name: dxc-copilot-app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dxc-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dxc-copilot.rule=Host(`copilot.dxc.com`)"
      - "traefik.http.routers.dxc-copilot.entrypoints=websecure"
      - "traefik.http.routers.dxc-copilot.tls.certresolver=letsencrypt"

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dxc-copilot-backend:latest
    container_name: dxc-copilot-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL must be set (use PostgreSQL in production)}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set to a strong random value}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD must be set}
      - APP_ENV=${APP_ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SSO_CLIENT_ID=${SSO_CLIENT_ID:-}
      - SSO_CLIENT_SECRET=${SSO_CLIENT_SECRET:-}
      - SSO_TENANT_ID=${SSO_TENANT_ID:-}
      - SSO_REDIRECT_URI=${SSO_REDIRECT_URI:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dxc-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis Cache ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dxc-copilot-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dxc-net

  # ── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dxc-copilot-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dxc_copilot_prod}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-dxc_copilot_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dxc-net

volumes:
  redis_data:
  postgres_data:

networks:
  dxc-net:
    driver: bridge
