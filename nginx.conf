# ── Backend upstream (FastAPI) ────────────────────────────────────
upstream dxc_backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP: redirect all traffic to HTTPS ──────────────────────────
server {
    listen 80;
    server_name _;

    # Allow health checks over plain HTTP (load balancers, compose healthcheck)
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main server block ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # TLS certificates — mount these via Docker volume or secrets
    ssl_certificate     /etc/ssl/certs/dxc-copilot.crt;
    ssl_certificate_key /etc/ssl/private/dxc-copilot.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection "1; mode=block"      always;
    add_header Referrer-Policy "strict-origin"       always;
    add_header Permissions-Policy "geolocation=()"   always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── API reverse proxy — single origin (no CORS, same-site cookies) ──
    # File uploads: chat allows 15 MB, admin KB uploads up to 50 MB
    client_max_body_size 50m;

    # Never expose Prometheus metrics publicly — scraped on the internal network
    location = /api/metrics {
        deny all;
        return 404;
    }

    # SSE streaming needs buffering off and long read timeouts
    location = /api/chat/stream {
        proxy_pass http://dxc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        add_header X-Accel-Buffering no;
    }

    location /api/ {
        proxy_pass http://dxc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check endpoint (no auth required — for load balancers)
    location /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Angular SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }
}
