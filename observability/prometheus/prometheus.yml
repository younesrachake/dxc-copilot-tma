global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: dxc-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: dxc-copilot-backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
