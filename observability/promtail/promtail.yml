server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all docker container logs on the host, labelled by container name
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      # Backend emits JSON logs when LOG_JSON=1 — extract the level for querying
      - match:
          selector: '{container="dxc-copilot-backend"}'
          stages:
            - json:
                expressions:
                  level: levelname
            - labels:
                level:
